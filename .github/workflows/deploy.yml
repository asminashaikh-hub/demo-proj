name: "Devops"
on:
  push:
    branches: [main]

jobs:
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v3

      - name: Login in Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.Docker_uname }}
          password: ${{ secrets.Docker_pass }}

      - name: Build the Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: asmina001/myapp:latest

      - name: SSH key
        run: |
           echo "${{secrets.ssh}}" > instance-key.pem
           chmod 400 instance-key.pem

      - name: Run ansible
        run: ansible-playbook play.yml
